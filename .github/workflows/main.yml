name: Docker Build and Trivy Scan

on:
  push:
    branches: [ "main" ]

  workflow_call:
    inputs:
      repo_name:
        description: "Name of the calling repository"
        required: false
        type: string
    secrets:
      DOCKER_TOKEN:
        required: false

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Show caller repo (optional)
        env:
          CALLER_REPO: ${{ inputs.repo_name }}
        run: |
          echo "Called by: ${CALLER_REPO:-$GITHUB_REPOSITORY}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t repo1-image .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: repo1-image
          format: table
          exit-code: 1
          severity: CRITICAL

      # ✅ Success notification
      - name: Send Teams notification on success
        if: success()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
                "text": "✅ Workflow SUCCESS\n\nRepository: '${{ github.repository }}'\nWorkflow: '${{ github.workflow }}'\nRun ID: '${{ github.run_id }}'"
              }' $TEAMS_WEBHOOK_URL

      # ❌ Failure notification
      - name: Send Teams notification on failure
        if: failure()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          curl -H "Content-Type: application/json" \
          -d '{
                "text": "❌ Workflow FAILED\n\nRepository: '${{ github.repository }}'\nWorkflow: '${{ github.workflow }}'\nRun ID: '${{ github.run_id }}'"
              }' $TEAMS_WEBHOOK_URL
