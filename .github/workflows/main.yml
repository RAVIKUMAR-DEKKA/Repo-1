name: Docker Build and Trivy Scan

on:
  push:
    branches: ["main"]

  workflow_call:
    inputs:
      repo_name:
        required: false
        type: string

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t repo1-image .

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: repo1-image
          format: table
          exit-code: 1
          severity: CRITICAL

      - name: Send Teams notification
        if: always()
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            ICON="✅"
            RESULT="SUCCESS"
          else
            ICON="❌"
            RESULT="FAILED"
          fi

          curl -H "Content-Type: application/json" \
          -d "{
            \"text\": \"$ICON Workflow $RESULT\n\nRepository: ${{ github.repository }}\nWorkflow: ${{ github.workflow }}\nRun ID: ${{ github.run_id }}\"
          }" \
          $TEAMS_WEBHOOK_URL
